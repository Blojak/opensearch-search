services:
  opensearch:
    image: opensearchproject/opensearch:2.19.0
    container_name: osearch_opensearch
    restart: unless-stopped
    environment:
      # Single-node cluster for a local PoC.
      - discovery.type=single-node
      - node.name=osearch-node
      # Disable the security plugin: no TLS/auth for local development, so the
      # app talks plain HTTP on port 9200 (see app/config.py OPENSEARCH_* vars).
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"   # REST/HTTP
      - "9600:9600"                       # performance analyzer
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test:
        ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Web UI to inspect the index / run queries (analogous to pgAdmin before).
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.0
    container_name: osearch_dashboards
    restart: unless-stopped
    environment:
      - 'OPENSEARCH_HOSTS=["http://opensearch:9200"]'
      # Match the cluster: no security plugin, so disable it in Dashboards too.
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "${OPENSEARCH_DASHBOARDS_PORT:-5601}:5601"
    depends_on:
      opensearch:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # PostgreSQL: source of truth for document metadata (the OpenSearch index is
  # a derived, rebuildable search index on top of this).
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17
    container_name: osearch_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-osearch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-osearch}
      POSTGRES_DB: ${POSTGRES_DB:-osearch}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-osearch} -d ${POSTGRES_DB:-osearch}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Web UI to inspect the metadata database / run SQL.
  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: osearch_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      # Skip the login screen's master-password prompt for a local PoC.
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      # Pre-register the Postgres connection (reachable as host "postgres"
      # on the internal network, port 5432).
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Keycloak: OIDC identity provider. The API is a resource server and only
  # validates the bearer tokens Keycloak issues (JWKS). If the corporate IdP
  # later speaks SAML, Keycloak can broker it upstream without the app changing.
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: osearch_keycloak
    restart: unless-stopped
    # start-dev: embedded H2, no TLS - local development only.
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      # Expose /health/ready on the management port (9000) for the healthcheck.
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      # Realm with the API client and a test user, imported on first start.
      - ./keycloak/realm-osearch.json:/opt/keycloak/data/import/realm-osearch.json:ro
    healthcheck:
      # The image ships no curl/wget, so probe the management port via bash.
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/9000 && printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '\"status\": \"UP\"' <&3",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  # ---------------------------------------------------------------------------
  # Frontend dev server in a container — for machines where no modern Node is
  # available (the Ubuntu package is Node 18, too old for Vite, which needs the
  # version pinned in frontend/.nvmrc). The image brings its own Node, so the
  # host stays untouched.
  #
  # Opt-in via the profile, so it does not collide with running `npm run dev`
  # natively on a machine that has Node:
  #
  #     docker compose --profile frontend up frontend
  #
  # The Flask API runs on the *host*, so the Vite proxy must not target the
  # container's own localhost — hence API_TARGET + the host-gateway mapping.
  # ---------------------------------------------------------------------------
  frontend:
    profiles: ["frontend"]
    # Any image with a Node that satisfies Vite's engines: ^20.19.0 || >=22.12.0
    # (Node 21 and 22.0-22.11 do NOT qualify). Override to use an image from an
    # internal registry: FRONTEND_IMAGE=<registry>/<image> in .env.
    image: ${FRONTEND_IMAGE:-node:24}
    container_name: osearch_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      API_TARGET: ${API_TARGET:-http://host.docker.internal:5002}
      # Behind a corporate mirror, point npm at it, e.g.
      # NPM_CONFIG_REGISTRY: https://artifactory.example/api/npm/npm-remote/
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      # Anonymous volume: keep the container's node_modules. The host's would be
      # built for the host and must not shadow it.
      - /app/node_modules
    extra_hosts:
      # Lets the container reach the API on the host as host.docker.internal.
      - "host.docker.internal:host-gateway"

volumes:
  opensearch_data:
  postgres_data:
  pgadmin_data:
  keycloak_data:
